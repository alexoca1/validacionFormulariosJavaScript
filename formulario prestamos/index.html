<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de préstamos</title>
</head>

<body>

    <h1>Solicitud de préstamos</h1>

    <form action="proecesar.php" onsubmit="return validarPrestamo()">

        <p>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre">
        </p>
        <p>
            <label for="importe">Importe a solicitar en euros</label>
            <input type="number" id="importe">
        </p>
        <p>
            <label for="edad">Edad</label>
            <input type="number" id="edad">
        </p>
        <p>Situación Laboral</p>
        <label for="activo">Activo</label>
        <input type="radio" name="laboral" value="activo" id="activo">
        <label for="desempleado">Desempleado</label>
        <input type="radio" name="laboral" value="desempleado">
        <label for="jubilado">Jubilado</label>
        <input type="radio" name="laboral" value="jubilado">
        <p>
            <button type="submit">Enviar</button>
        </p>

    </form>
    <h3 style="color: red;" id="mensaje"></h3>

    <script>
        function validarPrestamo() {
            let usuario = document.getElementById("nombre");
            let importe = document.getElementById("importe");
            let valorImporte = parseInt(document.getElementById("importe").value);
            let valorEdad = parseInt(document.getElementById("edad").value);
            let Edad = document.getElementById("edad");
            let laboral = document.getElementsByName("laboral");

            if (usuario.value.length == 0) {
                document.getElementById("mensaje").innerHTML = "Debes ingresar un nombre";

                usuario.focus();
                return false;
            }
            if (importe.value.length == "") {
                document.getElementById("mensaje").innerHTML = "Debes poner un importe";
                importe.focus();
                return false;
            }

            if (valorImporte <= 10000) {
                document.getElementById("mensaje").innerHTML = "El importe debe ser mayor a 10.000 euros";
                importe.focus();
                return false;
            }
            if (edad.value.length == "") {
                document.getElementById("mensaje").innerHTML = "Debes poner tu edad";
                edad.focus();
                return false;
            }


            if (valorEdad >= 65 || valorEdad < 18) {
                document.getElementById("mensaje").innerHTML = "Los prestamos solo son para personas menores de 65 años y mayores de 18 años";
                edad.focus();
                return false;
            }
            for (let i = 0; i < laboral.length; i++) {

                if (laboral[i].checked == true) {
                    return true;
                }
            }
            document.getElementById("mensaje").innerHTML = "Debes seleccionar una actividad laboral";
            document.getElementById("activo").focus();
            return false;
        }
    </script>
</body>

</html>
